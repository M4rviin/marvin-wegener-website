<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reisen — Marvin Wegener</title>
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--text:#1a1a18;--text-sec:#6b6b67;
    --text-muted:#9a9a96;--border:rgba(0,0,0,0.08);--teal:#1D9E75;
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--t:0.3s ease;
  }
  body.dark{
    --bg:#141412;--surface:#1e1e1c;--text:#e8e7e3;--text-sec:#9a9a96;
    --text-muted:#5f5e5a;--border:rgba(255,255,255,0.08);--teal:#5DCAA5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);transition:background var(--t),color var(--t);}

  /* ── HEADER ── */
  header{border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;transition:background var(--t);}
  .header-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2rem;height:64px;max-width:1200px;margin:0 auto;}
  nav.nav-left{display:flex;gap:2rem;}
  nav.nav-right{display:flex;gap:2rem;justify-content:flex-end;align-items:center;}
  nav a{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-sec);text-decoration:none;font-weight:500;transition:color var(--t);}
  nav a:hover,nav a.active{color:var(--teal);}
  .logo{text-align:center;}
  .logo h1{font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:0.05em;color:var(--text);}
  .logo p{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-top:2px;}
  .toggle-btn{background:none;border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--text-sec);font-size:11px;font-family:var(--sans);letter-spacing:0.05em;display:flex;align-items:center;gap:6px;transition:all var(--t);}
  .toggle-btn:hover{border-color:var(--teal);color:var(--teal);}

  /* ── HERO ── */
  .hero-wrap{
    background:#0f0e0c;
    padding: 24px 48px 28px;
  }
  .hero{
    display:grid;grid-template-columns:1fr 1.7fr;
    gap: 40px;
    align-items:center;
    max-width:1200px;
    margin: 0 auto;
  }
  .hero-text h2{
    font-family:var(--serif);font-size:32px;font-weight:400;
    line-height:1.2;color:#f0ede6;margin-bottom:14px;
  }
  .hero-text p{
    font-size:13px;color:rgba(240,237,230,0.5);
    line-height:1.65;margin-bottom:28px;max-width:200px;
  }
  .hero-cta{
    display:inline-flex;align-items:center;gap:10px;
    border:0.5px solid rgba(93,202,165,0.45);
    color:#5DCAA5;padding:10px 20px;
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
    font-family:var(--sans);font-weight:500;cursor:pointer;background:none;
    transition:all 0.25s ease;width:fit-content;text-decoration:none;
  }
  .hero-cta:hover{background:rgba(93,202,165,0.07);border-color:#5DCAA5;}
  .hero-cta svg{transition:transform 0.2s ease;}
  .hero-cta:hover svg{transform:translateX(3px);}

  .hero-img{
    position:relative;
    border-radius:2px;
    overflow:hidden;
  }
  .hero-img-ph{
    width:100%;
    aspect-ratio:16/8;
    background:linear-gradient(135deg,#1a2a22 0%,#0d1a14 50%,#111 100%);
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;
  }
  .hero-img-ph svg{opacity:0.1;}
  .hero-img-ph span{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.15);}
  .hero-dots{position:absolute;bottom:14px;right:16px;display:flex;gap:6px;}
  .hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:background 0.2s;}
  .hero-dot.active{background:rgba(255,255,255,0.8);}

  /* ── KATEGORIE-KACHELN ── */
  .cat-section{
    max-width:1200px;margin:0 auto;
    padding: 36px 2rem 0;
  }
  .cat-label-row{
    font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
    color:var(--text-muted);margin-bottom:20px;
  }
  .categories{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
  }
  @media(max-width:800px){.categories{grid-template-columns:repeat(2,1fr);}}

  .cat-card{
    position:relative;overflow:hidden;cursor:pointer;
    border-radius:2px;
    aspect-ratio:4/3;
    background:#111;
    transition:transform 0.35s ease;
  }
  .cat-card:hover{transform:translateY(-2px);}

  .cat-bg{width:100%;height:100%;transition:transform 0.5s ease;}
  .cat-card:hover .cat-bg{transform:scale(1.05);}

  .cat-card:nth-child(1) .cat-bg{background:linear-gradient(160deg,#2a3545,#0d1520);}
  .cat-card:nth-child(2) .cat-bg{background:linear-gradient(160deg,#2d3020,#0e1208);}
  .cat-card:nth-child(3) .cat-bg{background:linear-gradient(160deg,#352a20,#130d08);}
  .cat-card:nth-child(4) .cat-bg{background:linear-gradient(160deg,#253030,#0a1212);}

  .cat-overlay{
    position:absolute;inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.05) 60%,transparent 100%);
  }
  .cat-content{
    position:absolute;bottom:0;left:0;right:0;
    padding:16px;
  }
  .cat-icon{margin-bottom:6px;opacity:0.6;}
  .cat-name{font-family:var(--serif);font-size:17px;font-weight:400;color:#f0ede6;margin-bottom:3px;}
  .cat-count{font-size:10px;color:rgba(240,237,230,0.4);letter-spacing:0.05em;}

  /* ── GALERIE ── */
  .gallery-section{max-width:1200px;margin:0 auto;padding:52px 2rem 60px;}
  .section-header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:0.5px solid var(--border);
    padding-bottom:20px;margin-bottom:36px;
  }
  .section-header h3{font-family:var(--serif);font-size:22px;font-weight:400;}
  .section-header span{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);}

  .trip-group{margin-bottom:52px;}
  .trip-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:12px;}
  .trip-label::after{content:'';flex:1;height:0.5px;background:var(--border);}

  .masonry{columns:3;column-gap:12px;}
  @media(max-width:800px){.masonry{columns:2;}}
  @media(max-width:480px){.masonry{columns:1;}}

  .photo-item{break-inside:avoid;margin-bottom:12px;position:relative;overflow:hidden;cursor:pointer;border-radius:2px;border:0.5px solid var(--border);transition:border-color var(--t);}
  .photo-item:hover{border-color:transparent;}
  .ph{width:100%;display:flex;align-items:center;justify-content:center;transition:background var(--t);}
  .ph svg{opacity:0.1;}
  .ph.c-asien  {background:linear-gradient(145deg,#1a2018,#0d140a);}
  .ph.c-europa {background:linear-gradient(145deg,#18202a,#0a1018);}
  .ph.c-natur  {background:linear-gradient(145deg,#1a2218,#0c1408);}
  .ph.c-stadt  {background:linear-gradient(145deg,#201e1a,#12100e);}

  .overlay{position:absolute;inset:0;background:linear-gradient(160deg,transparent 45%,rgba(0,0,0,0.55));opacity:0;transition:opacity 0.25s ease;display:flex;align-items:flex-end;padding:14px;}
  .photo-item:hover .overlay{opacity:1;}
  .ov-inner{display:flex;justify-content:space-between;align-items:flex-end;width:100%;}
  .ov-loc{font-size:11px;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.93);font-weight:500;}
  .ov-yr{font-size:11px;color:rgba(255,255,255,0.45);}

  /* ── FOOTER ── */
  .footer-wrap{border-top:0.5px solid var(--border);}
  footer{padding:24px 2rem;display:flex;justify-content:space-between;max-width:1200px;margin:0 auto;font-size:11px;color:var(--text-muted);}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <nav class="nav-left">
      <a href="index.html">Start</a>
      <a href="reisen.html" class="active">Reisen</a>
    </nav>
    <div class="logo">
      <h1>Marvin Wegener</h1>
      <p>marvin-wegener.de</p>
    </div>
    <nav class="nav-right">
      <a href="portfolio.html">Portfolio</a>
      <button class="toggle-btn" onclick="toggleDark()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <span id="lbl">Dark</span>
      </button>
    </nav>
  </div>
</header>

<!-- HERO -->
<div class="hero-wrap">
  <div class="hero">
    <div class="hero-text">
      <h2>Jede Reise.<br>Ein Moment.</h2>
      <p>Kuratierte Galerien aus Orten, die bleiben.</p>
      <a href="#galerien" class="hero-cta">
        Galerien ansehen
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
    <div class="hero-img">
      <div class="hero-img-ph">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="0.8"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>Titelbild Platzhalter</span>
      </div>
      <div class="hero-dots">
        <div class="hero-dot active"></div>
        <div class="hero-dot"></div>
        <div class="hero-dot"></div>
        <div class="hero-dot"></div>
      </div>
    </div>
  </div>
</div>

<!-- KATEGORIE-KACHELN -->
<div class="cat-section" id="galerien">
  <div class="cat-label-row">Galerien</div>
  <div class="categories">
    <div class="cat-card" onclick="filterGallery('europa')">
      <div class="cat-bg"></div>
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <div class="cat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div class="cat-name">Europa</div>
        <div class="cat-count" id="cnt-europa"></div>
      </div>
    </div>
    <div class="cat-card" onclick="filterGallery('asien')">
      <div class="cat-bg"></div>
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <div class="cat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
        </div>
        <div class="cat-name">Asien</div>
        <div class="cat-count" id="cnt-asien"></div>
      </div>
    </div>
    <div class="cat-card" onclick="filterGallery('natur')">
      <div class="cat-bg"></div>
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <div class="cat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2"><path d="M17 8C8 10 5.9 16.17 3.82 22"/><path d="M9.5 14.5c.5-2.5 4-4.5 6.5-4"/><path d="M14.5 9C16 5 20 4 21 2c0 0-4 1-7 4"/></svg>
        </div>
        <div class="cat-name">Natur</div>
        <div class="cat-count" id="cnt-natur"></div>
      </div>
    </div>
    <div class="cat-card" onclick="filterGallery('stadt')">
      <div class="cat-bg"></div>
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <div class="cat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2"><rect x="3" y="7" width="7" height="14"/><rect x="10" y="3" width="7" height="18"/><path d="M17 7h4v14h-4"/></svg>
        </div>
        <div class="cat-name">Stadt</div>
        <div class="cat-count" id="cnt-stadt"></div>
      </div>
    </div>
  </div>
</div>

<!-- GALERIE -->
<div class="gallery-section">
  <div class="section-header">
    <h3 id="gallery-title">Alle Reisen</h3>
    <span id="count"></span>
  </div>
  <div id="gallery"></div>
</div>

<div class="footer-wrap">
  <footer>
    <span>© 2025 Marvin Wegener</span>
    <span style="color:var(--teal)">marvin-wegener.de</span>
  </footer>
</div>

<script>
const trips = [
  { id:'japan-2023',      label:'Japan 2023',        tag:'asien',  photos:[
    {loc:'Kyoto',year:'2023',h:290},{loc:'Tokyo',year:'2023',h:200},
    {loc:'Osaka',year:'2023',h:245},{loc:'Nara',year:'2023',h:175}]},
  { id:'alpen-2024',      label:'Alpen 2024',         tag:'natur',  photos:[
    {loc:'Dolomiten',year:'2024',h:225},{loc:'Tirol',year:'2024',h:315},
    {loc:'Schwarzwald',year:'2024',h:185}]},
  { id:'suedeuropa-2022', label:'Südeuropa 2022',     tag:'europa', photos:[
    {loc:'Lissabon',year:'2022',h:260},{loc:'Santorini',year:'2022',h:200},
    {loc:'Barcelona',year:'2022',h:340},{loc:'Sevilla',year:'2022',h:195},
    {loc:'Mallorca',year:'2022',h:230}]},
  { id:'asien-2022',      label:'Südostasien 2022',   tag:'asien',  photos:[
    {loc:'Bali',year:'2022',h:280},{loc:'Singapur',year:'2022',h:195}]},
  { id:'skandinavien-2023',label:'Skandinavien 2023', tag:'natur',  photos:[
    {loc:'Norwegen',year:'2023',h:320},{loc:'Bergen',year:'2023',h:190}]},
  { id:'staedte-2021',    label:'Städte 2021',        tag:'stadt',  photos:[
    {loc:'Paris',year:'2021',h:240},{loc:'Amsterdam',year:'2021',h:195},
    {loc:'München',year:'2021',h:270}]},
];

const icon=`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;

let activeFilter='alle';

function updateCounts(){
  ['europa','asien','natur','stadt'].forEach(tag=>{
    const n=trips.filter(t=>t.tag===tag).reduce((s,t)=>s+t.photos.length,0);
    document.getElementById('cnt-'+tag).textContent=n+' Aufnahmen';
  });
}

function filterGallery(tag){
  activeFilter=tag;
  const titles={alle:'Alle Reisen',europa:'Europa',asien:'Asien',natur:'Natur',stadt:'Stadt'};
  document.getElementById('gallery-title').textContent=titles[tag];
  renderGallery();
  document.querySelector('.gallery-section').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderGallery(){
  const visible=activeFilter==='alle'?trips:trips.filter(t=>t.tag===activeFilter);
  const total=visible.reduce((s,t)=>s+t.photos.length,0);
  document.getElementById('count').textContent=total+' Aufnahmen';
  document.getElementById('gallery').innerHTML=visible.map(trip=>`
    <div class="trip-group">
      <div class="trip-label">${trip.label}</div>
      <div class="masonry">
        ${trip.photos.map(p=>`
          <div class="photo-item">
            <div class="ph c-${trip.tag}" style="height:${p.h}px">${icon}</div>
            <div class="overlay">
              <div class="ov-inner">
                <span class="ov-loc">${p.loc}</span>
                <span class="ov-yr">${p.year}</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

let dark=localStorage.getItem('mw-dark')==='1';
function applyDark(){
  document.body.classList.toggle('dark',dark);
  document.getElementById('lbl').textContent=dark?'Hell':'Dark';
}
function toggleDark(){
  dark=!dark;
  localStorage.setItem('mw-dark',dark?'1':'0');
  applyDark();
}

applyDark();
updateCounts();
renderGallery();
</script>
</body>
</html>
