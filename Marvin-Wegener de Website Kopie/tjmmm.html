<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJMMM — Marvin Wegener</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── HERO (wie Momente) ── */
    .hero-wrap { background: #0f0e0c; padding: 24px 48px 28px; }
    .hero {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
      gap: 48px;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 700px) { .hero { grid-template-columns: 1fr; gap: 28px; } }

    .hero-eyebrow {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.35);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      width: 18px; height: 0.5px;
      background: #5DCAA5;
      flex-shrink: 0;
    }
    .hero-text h2 {
      font-family: var(--serif);
      font-size: 38px;
      font-weight: 400;
      line-height: 1.15;
      color: #f0ede6;
      letter-spacing: 0.14em;
      margin-bottom: 14px;
    }
    .hero-text p {
      font-size: 12px;
      color: rgba(240,237,230,0.35);
      line-height: 1.65;
      margin-bottom: 24px;
      max-width: 200px;
    }
    .add-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0.5px solid rgba(93,202,165,0.45);
      color: #5DCAA5;
      padding: 10px 20px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      background: none;
      transition: all 0.25s ease;
    }
    .add-btn:hover { background: rgba(93,202,165,0.07); border-color: #5DCAA5; }

    /* Slideshow */
    .hero-img { position: relative; border-radius: 2px; overflow: hidden; }
    .slideshow {
      width: 100%;
      aspect-ratio: 16/8;
      position: relative;
      background: #111;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    .slide.active { opacity: 1; }

    .hero-dots {
      position: absolute;
      bottom: 12px;
      right: 14px;
      display: flex;
      gap: 6px;
    }
    .hero-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s;
    }
    .hero-dot.active { background: rgba(255,255,255,0.85); }

    /* ── TIMELINE WRAPPER ── */
    .tl-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 2rem 100px;
      position: relative;
    }
    .tl-line {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 1.5px;
      background: var(--text-muted);
      opacity: 0.4;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .timeline { position: relative; z-index: 1; }

    /* ── JAHRESBADGE ── */
    .year-block { }
    .year-badge {
      display: flex;
      justify-content: center;
      margin: 28px 0 12px;
      position: relative;
      z-index: 1;
    }
    .year-badge:first-of-type { margin-top: 0; }
    .year-badge span {
      background: var(--bg);
      padding: 6px 24px;
      border: 0.5px solid var(--border);
      font-family: var(--serif);
      font-size: 17px;
      letter-spacing: 0.16em;
      color: var(--text);
      font-weight: 400;
      transition: background var(--t), border-color var(--t), color var(--t);
    }

    /* ── TIMELINE COLUMNS (masonry: links/rechts unabhängig gestapelt) ── */
    .tl-columns {
      display: flex;
      align-items: flex-start;
      position: relative;
    }
    .tl-col {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .tl-col-left  { align-items: flex-end; }
    .tl-col-right { align-items: flex-start; }

    /* ── ALBUM CARD ── */
    .tl-col-left  .album-card { width: 100%; margin-right: 26px; }
    .tl-col-right .album-card { width: 100%; margin-left: 26px; }

    /* Verbindungslinie von Karte zur Mittellinie */
    .tl-col-right .album-card::before {
      content: ''; position: absolute;
      left: -26px; top: 22px;
      width: 26px; height: 0.5px;
      background: var(--border);
    }
    .tl-col-left .album-card::before {
      content: ''; position: absolute;
      right: -26px; top: 22px;
      width: 26px; height: 0.5px;
      background: var(--border);
    }

    /* Punkt exakt auf der Mittellinie */
    .tl-dot {
      position: absolute;
      top: 22px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--teal);
      border: 2px solid var(--bg);
      transition: border-color var(--t), background var(--t);
    }
    .tl-col-right .tl-dot { left: -26px;  transform: translate(-50%, -50%); }
    .tl-col-left  .tl-dot { right: -26px; transform: translate(50%, -50%); }

    .album-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      padding: 16px;
      position: relative;
      transition: border-color var(--t), background var(--t);
    }
    .album-card:hover { border-color: var(--teal); }

    .album-date {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 5px;
    }
    .album-title {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.25;
    }
    .album-photos {
      display: flex;
      gap: 3px;
    }
    .album-thumb {
      flex: 1;
      min-width: 0;
      aspect-ratio: 4/3;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .album-thumb:hover { opacity: 0.82; }
    .album-more {
      flex: 1;
      min-width: 0;
      aspect-ratio: 4/3;
      background: var(--bg);
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--serif);
      font-size: 13px;
      color: var(--text-muted);
    }
    .album-count {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 10px;
    }
    .album-delete {
      position: absolute;
      top: 9px; right: 9px;
      background: none;
      border: 0.5px solid var(--border);
      color: var(--text-muted);
      width: 22px; height: 22px;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      opacity: 0;
      font-family: var(--sans);
    }
    .album-card:hover .album-delete { opacity: 1; }
    .album-delete:hover { border-color: #c0524a; color: #c0524a; }
    .album-delete.confirm { border-color: #c0524a; color: #c0524a; opacity: 1; }

    /* ── LEER-ZUSTAND ── */
    .tl-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px;
      text-align: center;
    }
    .tl-empty-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 0.5px solid var(--border);
      margin-bottom: 24px;
    }
    .tl-empty-text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    /* ── FLOATING NAV ── */
    .tl-nav {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 90;
    }

    /* Track: nur so breit wie die Striche — keine große Hitzone */
    .tl-nav-track {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0;
      padding: 8px 4px;
      position: relative;
    }
    .tl-nav-track::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 0.5px solid rgba(255,255,255,0.1);
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .tl-nav.open .tl-nav-track::before { opacity: 1; }

    /* Jedes Item: Strich + absolut positioniertes Label links davon */
    .tl-nav-item {
      position: relative;
      cursor: pointer;
      padding: 6px 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    /* Label schwebt links des Strichs */
    .tl-nav-label {
      position: absolute;
      right: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%) translateX(5px);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text-sec);
      white-space: nowrap;
      opacity: 0;
      /* Standardmäßig kein Hit-Testing — unsichtbare Labels dürfen nicht
         versehentlich Hover auslösen, solange das Nav geschlossen ist */
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease, color 0.15s ease;
      background: var(--bg);
      border: 0.5px solid var(--border);
      padding: 3px 9px;
      border-radius: 2px;
      cursor: pointer;
    }
    .tl-nav.open .tl-nav-label {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
      pointer-events: auto; /* erst wenn sichtbar auch hoverbar */
    }
    .tl-nav.open .tl-nav-label:hover { color: var(--text); }
    .tl-nav-item.active .tl-nav-label {
      color: var(--teal);
      font-weight: 500;
    }
    .tl-nav-item.active .tl-nav-label:hover { color: var(--teal) !important; }

    /* Strich */
    .tl-nav-line {
      height: 1.5px;
      background: var(--text-muted);
      opacity: 0.4;
      flex-shrink: 0;
      width: 16px;
      transition: width 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }
    .tl-nav-item.active .tl-nav-line {
      width: 30px;
      background: var(--teal);
      opacity: 1;
    }
    .tl-nav-item:hover:not(.active) .tl-nav-line {
      opacity: 0.75;
      width: 22px;
    }

    /* ── HINZUFÜGEN MODAL ── */
    .add-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .add-overlay.visible { opacity: 1; pointer-events: all; }
    .add-modal {
      background: var(--bg);
      border: 0.5px solid var(--border);
      width: 100%; max-width: 500px;
      max-height: 90vh;
      display: flex; flex-direction: column;
    }
    .add-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 26px 18px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .add-title    { font-family: var(--serif); font-size: 20px; font-weight: 400; }
    .add-subtitle { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
    .add-body     { padding: 22px 26px; overflow-y: auto; flex: 1; }
    .add-field    { margin-bottom: 18px; }
    .add-label    { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .add-input {
      width: 100%; background: var(--surface);
      border: 0.5px solid var(--border);
      padding: 9px 12px; font-size: 13px; color: var(--text);
      font-family: var(--sans); transition: border-color 0.2s;
    }
    .add-input:focus { outline: none; border-color: var(--teal); }
    .add-drop {
      border: 0.5px dashed var(--border);
      padding: 28px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; color: var(--text-muted);
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .add-drop:hover, .add-drop.drag { border-color: var(--teal); color: var(--teal); }
    .add-drop svg { opacity: 0.3; }
    .add-preview {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-top: 10px;
    }
    .add-preview-thumb { aspect-ratio: 1; background-size: cover; background-position: center; }
    .add-footer {
      padding: 14px 26px; border-top: 0.5px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .add-status { font-size: 11px; color: var(--text-muted); }
    .add-save {
      background: var(--teal); color: #fff; border: none;
      padding: 9px 24px; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; font-family: var(--sans); font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
    }
    .add-save:hover { opacity: 0.85; }
    .add-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .bm-close {
      background: none; border: 0.5px solid var(--border);
      width: 30px; height: 30px; cursor: pointer;
      color: var(--text-sec); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .bm-close:hover { border-color: var(--text); color: var(--text); }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .lightbox.visible { opacity: 1; pointer-events: all; }
    .lb-img { max-width: 90vw; max-height: 88vh; object-fit: contain; }
    .lb-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: 0.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.65); width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .lb-close:hover { border-color: #fff; color: #fff; }
    .lb-prev, .lb-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,0.45); font-size: 44px; line-height: 1;
      cursor: pointer; padding: 12px 20px;
      transition: color 0.15s; font-family: serif;
    }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
    .lb-prev:hover, .lb-next:hover { color: rgba(255,255,255,0.9); }
    .lb-counter {
      position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    @media (max-width: 640px) {
      .hero-wrap { padding: 20px 20px 24px; }
      .tl-col-left  .album-card { margin-right: 16px; }
      .tl-col-right .album-card { margin-left: 16px; }
      .tl-col-right .album-card::before, .tl-col-right .tl-dot { left: -16px; }
      .tl-col-left  .album-card::before, .tl-col-left  .tl-dot { right: -16px; }
      .tl-col-right .album-card::before, .tl-col-left .album-card::before { width: 16px; }
      .tl-nav { display: none; }
    }
  </style>
</head>
<body>
  <!-- Dark Mode FOUC-Schutz -->
  <script>if(localStorage.getItem('mw-dark')==='1')document.body.classList.add('dark');</script>

  <!-- PIN MODAL (Seitensperre + Bearbeiten) -->
  <div class="pin-overlay" id="pinOverlay">
    <div class="pin-modal">
      <h3 id="pinTitle">Privat</h3>
      <p id="pinDesc">PIN eingeben um fortzufahren.</p>
      <div class="pin-error-msg" id="pinError"></div>
      <div class="pin-dots" id="pinDots">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-pad" id="pinPad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key" data-key="del" style="font-size:13px;">⌫</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key" data-key="del" style="font-size:11px;letter-spacing:.05em;">DEL</button>
      </div>
      <button class="pin-cancel" id="pinCancel">Abbrechen</button>
    </div>
  </div>

  <!-- HINZUFÜGEN MODAL -->
  <div class="add-overlay" id="addModal">
    <div class="add-modal">
      <div class="add-header">
        <div>
          <div class="add-title">Moment hinzufügen</div>
          <div class="add-subtitle">Fotos einem Zeitraum zuordnen</div>
        </div>
        <button class="bm-close" id="addModalClose">✕</button>
      </div>
      <div class="add-body">
        <div class="add-field">
          <label class="add-label" for="addDate">Datum</label>
          <input type="month" class="add-input" id="addDate">
        </div>
        <div class="add-field">
          <label class="add-label" for="addTitle">Titel <span style="opacity:.45">(optional)</span></label>
          <input type="text" class="add-input" id="addTitle" placeholder="z. B. Weihnachten, Urlaub, Geburtstag …">
        </div>
        <div class="add-field">
          <label class="add-label">Fotos</label>
          <div class="add-drop" id="addDrop">
            <input type="file" id="addPhotos" multiple accept="image/*" style="display:none">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="1"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span id="dropLabel">Fotos auswählen oder hierher ziehen</span>
          </div>
          <div id="addPreview" class="add-preview"></div>
        </div>
      </div>
      <div class="add-footer">
        <div class="add-status" id="addStatus"></div>
        <button class="add-save" id="addSave">Speichern</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">✕</button>
    <button class="lb-prev" id="lbPrev">‹</button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-next" id="lbNext">›</button>
    <div class="lb-counter" id="lbCounter"></div>
  </div>

  <div id="site-header"></div>

  <!-- HERO -->
  <div class="hero-wrap">
    <div class="hero">
      <div class="hero-text">
        <div class="hero-eyebrow">Familie</div>
        <h2>T · J · M<br>M · M</h2>
        <p>Gemeinsame Momente, festgehalten.</p>
        <button class="add-btn" id="addBtn">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Moment hinzufügen
        </button>
      </div>
      <div class="hero-img">
        <div class="slideshow" id="heroSlideshow"></div>
        <div class="hero-dots" id="heroDots"></div>
      </div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="tl-wrap">
    <div class="tl-line"></div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- FLOATING NAV -->
  <div class="tl-nav" id="tlNav">
    <div class="tl-nav-track" id="tlNavTrack"></div>
  </div>

  <div id="site-footer"></div>

  <script src="config/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/tjmmm.js"></script>
</body>
</html>
