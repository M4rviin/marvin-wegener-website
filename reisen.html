<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reisen — Marvin Wegener</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── HERO (dunkler Bereich, unabhängig vom Dark Mode) ── */
    .hero-wrap {
      background: #0f0e0c;
      padding: 24px 48px 28px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr 1.7fr;
      gap: 40px;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .hero-text h2 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      line-height: 1.2;
      color: #f0ede6;
      margin-bottom: 14px;
    }
    .hero-text p {
      font-size: 13px;
      color: rgba(240,237,230,0.5);
      line-height: 1.65;
      margin-bottom: 28px;
      max-width: 200px;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 0.5px solid rgba(93,202,165,0.45);
      color: #5DCAA5;
      padding: 10px 20px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      background: none;
      transition: all 0.25s ease;
      text-decoration: none;
    }
    .hero-cta:hover { background: rgba(93,202,165,0.07); border-color: #5DCAA5; }
    .hero-cta svg { transition: transform 0.2s ease; }
    .hero-cta:hover svg { transform: translateX(3px); }

    .hero-img { position: relative; border-radius: 2px; overflow: hidden; }
    .hero-img-ph {
      width: 100%;
      aspect-ratio: 16/8;
      /* PLATZHALTER: Titelbild */
      background: linear-gradient(135deg, #1a2a22 0%, #0d1a14 50%, #111 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }
    .hero-img-ph svg  { opacity: 0.1; }
    .hero-img-ph span {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
    }
    .hero-dots { position: absolute; bottom: 14px; right: 16px; display: flex; gap: 6px; }
    .hero-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: background 0.2s;
    }
    .hero-dot.active { background: rgba(255,255,255,0.8); }

    /* ── KATEGORIE-KACHELN ── */
    .cat-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 2rem 0;
    }
    .cat-label-row {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .categories {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    @media (max-width: 800px) { .categories { grid-template-columns: repeat(2, 1fr); } }

    .cat-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 2px;
      aspect-ratio: 4/3;
      background: #111;
      transition: transform 0.35s ease;
    }
    .cat-card:hover { transform: translateY(-2px); }
    .cat-bg { width: 100%; height: 100%; transition: transform 0.5s ease; }
    .cat-card:hover .cat-bg { transform: scale(1.05); }

    .cat-card:nth-child(1) .cat-bg { background: linear-gradient(160deg, #2a3545, #0d1520); }
    .cat-card:nth-child(2) .cat-bg { background: linear-gradient(160deg, #2d3020, #0e1208); }
    .cat-card:nth-child(3) .cat-bg { background: linear-gradient(160deg, #352a20, #130d08); }
    .cat-card:nth-child(4) .cat-bg { background: linear-gradient(160deg, #253030, #0a1212); }

    .cat-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.05) 60%, transparent 100%);
    }
    .cat-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; }
    .cat-icon    { margin-bottom: 6px; opacity: 0.6; }
    .cat-name    { font-family: var(--serif); font-size: 17px; font-weight: 400; color: #f0ede6; margin-bottom: 3px; }
    .cat-count   { font-size: 10px; color: rgba(240,237,230,0.4); letter-spacing: 0.05em; }

    /* ── GALERIE ── */
    .gallery-section { max-width: 1200px; margin: 0 auto; padding: 52px 2rem 60px; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 0.5px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 36px;
    }
    .section-header h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; }
    .section-header span { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

    .trip-group  { margin-bottom: 52px; }
    .trip-label  {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .trip-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

    .masonry { columns: 3; column-gap: 12px; }
    @media (max-width: 800px) { .masonry { columns: 2; } }
    @media (max-width: 480px) { .masonry { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 2px;
      border: 0.5px solid var(--border);
      transition: border-color var(--t);
    }
    .photo-item:hover { border-color: transparent; }

    .ph { width: 100%; display: flex; align-items: center; justify-content: center; transition: background var(--t); }
    .ph svg { opacity: 0.1; }
    .ph.c-asien  { background: linear-gradient(145deg, #1a2018, #0d140a); }
    .ph.c-europa { background: linear-gradient(145deg, #18202a, #0a1018); }
    .ph.c-natur  { background: linear-gradient(145deg, #1a2218, #0c1408); }
    .ph.c-stadt  { background: linear-gradient(145deg, #201e1a, #12100e); }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, transparent 45%, rgba(0,0,0,0.55));
      opacity: 0;
      transition: opacity 0.25s ease;
      display: flex;
      align-items: flex-end;
      padding: 14px;
    }
    .photo-item:hover .overlay { opacity: 1; }
    .ov-inner { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
    .ov-loc   { font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.93); font-weight: 500; }
    .ov-yr    { font-size: 11px; color: rgba(255,255,255,0.45); }
  </style>
</head>
<body>
  <!-- Dark Mode FOUC-Schutz -->
  <script>if(localStorage.getItem('mw-dark')==='1')document.body.classList.add('dark');</script>

  <div id="site-header"></div>

  <!-- HERO -->
  <div class="hero-wrap">
    <div class="hero">
      <div class="hero-text">
        <h2>Jede Reise.<br>Ein Moment.</h2>
        <p>Kuratierte Galerien aus Orten, die bleiben.</p>
        <a href="#galerien" class="hero-cta">
          Galerien ansehen
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>
      <div class="hero-img">
        <!-- PLATZHALTER: Titelbild Reisen -->
        <div class="hero-img-ph">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="0.8">
            <rect x="3" y="3" width="18" height="18" rx="1"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>Titelbild Platzhalter</span>
        </div>
        <div class="hero-dots">
          <div class="hero-dot active"></div>
          <div class="hero-dot"></div>
          <div class="hero-dot"></div>
          <div class="hero-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- KATEGORIE-KACHELN -->
  <div class="cat-section" id="galerien">
    <div class="cat-label-row">Galerien</div>
    <div class="categories">
      <div class="cat-card" data-filter="europa">
        <div class="cat-bg"></div>
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <div class="cat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div class="cat-name">Europa</div>
          <div class="cat-count" id="cnt-europa"></div>
        </div>
      </div>
      <div class="cat-card" data-filter="asien">
        <div class="cat-bg"></div>
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <div class="cat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
            </svg>
          </div>
          <div class="cat-name">Asien</div>
          <div class="cat-count" id="cnt-asien"></div>
        </div>
      </div>
      <div class="cat-card" data-filter="natur">
        <div class="cat-bg"></div>
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <div class="cat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2">
              <path d="M17 8C8 10 5.9 16.17 3.82 22"/>
              <path d="M9.5 14.5c.5-2.5 4-4.5 6.5-4"/>
              <path d="M14.5 9C16 5 20 4 21 2c0 0-4 1-7 4"/>
            </svg>
          </div>
          <div class="cat-name">Natur</div>
          <div class="cat-count" id="cnt-natur"></div>
        </div>
      </div>
      <div class="cat-card" data-filter="stadt">
        <div class="cat-bg"></div>
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <div class="cat-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.2">
              <rect x="3" y="7" width="7" height="14"/>
              <rect x="10" y="3" width="7" height="18"/>
              <path d="M17 7h4v14h-4"/>
            </svg>
          </div>
          <div class="cat-name">Stadt</div>
          <div class="cat-count" id="cnt-stadt"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- GALERIE -->
  <div class="gallery-section">
    <div class="section-header">
      <h3 id="gallery-title">Alle Reisen</h3>
      <span id="count"></span>
    </div>
    <div id="gallery"></div>
  </div>

  <div id="site-footer"></div>

  <script src="js/main.js"></script>
  <script src="js/reisen.js"></script>
</body>
</html>
